name: Release on GitHub

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: 21
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
    - name: Prepare Android keystore
      run: echo ${{ secrets.ENCODEDKEYSTORE }} | base64 --decode > app/keystore.jks
    - name: Build release APK
      run: ./gradlew assembleOssNoadsRelease --build-cache
      env:
        APPID: de.szalkowski.activitylauncher.oss
        KEYSTORE: keystore.jks
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTOREPASSWORD }}
        KEY_ALIAS: de.szalkowski.activitylauncher.oss
        KEY_PASSWORD: ${{ secrets.KEYPASSWORD }}
    - name: Create Release and Upload APK
      uses: softprops/action-gh-release@v2
      with:
        draft: false
        prerelease: false
        name: ${{ github.ref_name }}
        tag_name: ${{ github.ref }}
        body_path: whatsnew/whatsnew-en-GB
        files: app/build/outputs/apk/ossNoads/release/app-oss-noads-release.apk
        token: ${{ github.token }}
